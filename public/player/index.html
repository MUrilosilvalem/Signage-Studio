<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;900&family=Barlow:wght@300;400&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  overflow:hidden;
  width:100vw; height:100vh;
  font-family:'Barlow',sans-serif;
  color:#fff;
}

body.portrait {
  width: 100vh;
  height: 100vw;
  transform: rotate(90deg);
  transform-origin: center;
  position: fixed;
  top: 50%;
  left: 50%;
  margin-top: calc(-100vw / 2);
  margin-left: calc(-100vh / 2);
}

/* ── Slides ── */
#stage { position:relative; width:100%; height:100%; }

.slide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .7s ease; pointer-events:none;
}
.slide.active { opacity:1; pointer-events:auto; }
.slide.no-fade { transition:none; }

.slide img { max-width:100%; max-height:100%; object-fit:contain; }
.slide video { max-width:100%; max-height:100%; object-fit:contain; }
.slide iframe { width:100%; height:100%; border:none; }
.slide.cover img, .slide.cover video { object-fit:cover; width:100%; height:100%; }

/* Text overlay */
.overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:5vw;
  background:linear-gradient(to top, rgba(0,0,0,.82) 0%, transparent 55%);
}
.overlay-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.8rem,5.5vw,5rem);
  font-weight:900; text-transform:uppercase;
  line-height:1; letter-spacing:.02em;
  text-shadow:0 2px 20px rgba(0,0,0,.7);
  margin-bottom:.4em;
}
.overlay-sub {
  font-size:clamp(.9rem,2vw,1.6rem);
  font-weight:300; color:rgba(255,255,255,.8);
  max-width:65%; text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px;
  background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
  z-index:80; transition:opacity .4s;
}
#hud.hidden { opacity:0; }

#hud-logo {
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.3rem; font-weight:700; letter-spacing:.16em;
  text-transform:uppercase;
}
#hud-clock {
  font-family:'Barlow Condensed',sans-serif;
  font-size:2.2rem; font-weight:600; letter-spacing:.06em;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}
#hud-date {
  font-size:.8rem; font-weight:300; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(255,255,255,.7); text-align:right;
}

/* ── Progress bar ── */
#progress {
  position:fixed; bottom:0; left:0;
  height:3px; background:var(--accent,#00e5ff);
  box-shadow:0 0 8px var(--accent,#00e5ff);
  z-index:80; transition:width linear;
}

/* ── Dots ── */
#dots {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px; z-index:80;
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,.28); transition:all .3s;
}
.dot.active {
  background:var(--accent,#00e5ff);
  box-shadow:0 0 6px var(--accent,#00e5ff);
  transform:scale(1.5);
}

/* ── Ticker ── */
#ticker {
  position:fixed; bottom:0; left:0; right:0;
  height:44px; background:rgba(0,0,0,.76);
  backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; overflow:hidden; z-index:79;
}
#ticker-label {
  flex-shrink:0; padding:0 18px; height:100%;
  display:flex; align-items:center;
  font-family:'Barlow Condensed',sans-serif; font-size:.85rem;
  font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:#000;
}
#ticker-scroll { flex:1; overflow:hidden; }
#ticker-text {
  display:inline-block; white-space:nowrap;
  animation:ticker-anim 30s linear infinite;
  padding-left:100%; font-size:.9rem; color:rgba(255,255,255,.85);
}
@keyframes ticker-anim { from { transform:translateX(0); } to { transform:translateX(-100%); } }

/* ── Connection indicator ── */
#conn {
  position:fixed; top:14px; right:14px; z-index:100;
  width:10px; height:10px; border-radius:50%;
  background:#444; transition:background .4s;
}
#conn.ok { background:#00c896; box-shadow:0 0 8px #00c896; }
#conn.warn { background:#ffb800; }

/* ── Empty / loading ── */
#empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100vh; gap:18px; color:rgba(255,255,255,.3);
}
#empty .big { font-size:5rem; }
#empty h2 { font-family:'Barlow Condensed',sans-serif; font-size:2rem; text-transform:uppercase; letter-spacing:.1em; }
#empty p { font-size:.9rem; }
</style>
</head>
<body>

<div id="conn" title="Conexão com servidor"></div>

<div id="hud">
  <div id="hud-logo">SIGNAGE</div>
  <div id="hud-clock">00:00</div>
  <div id="hud-date"></div>
</div>

<div id="stage">
  <div id="empty">
    <div class="big">📺</div>
    <h2>Aguardando conteúdo</h2>
    <p>Conectando ao servidor...</p>
  </div>
</div>

<div id="progress" style="width:0%"></div>
<div id="dots"></div>

<div id="ticker" style="display:none">
  <div id="ticker-label"></div>
  <div id="ticker-scroll"><span id="ticker-text"></span></div>
</div>

<script>
// ════════════════════════════════════
//  VARS
// ════════════════════════════════════
let playlist = [];
let config = {};
let currentIdx = 0;
let isPaused = false;
let slideTimer = null;
let ws = null;
let wsReconnectTimer = null;

const SCREEN_NAME = localStorage.getItem('screen_name') || promptName();

function promptName() {
  const n = prompt('Nome desta tela (ex: Recepção, Refeitório):', 'Tela') || 'Tela';
  localStorage.setItem('screen_name', n);
  return n;
}

// ════════════════════════════════════
//  ORIENTATION
// ════════════════════════════════════
function applyOrientation() {
  const orientation = config.orientation || 'landscape';
  const body = document.body;
  
  if (orientation === 'portrait') {
    body.classList.add('portrait');
  } else {
    body.classList.remove('portrait');
  }
}

// ════════════════════════════════════
//  WEBSOCKET
// ════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('conn').className = 'ok';
    ws.send(JSON.stringify({ type:'identify', screen: SCREEN_NAME }));
    clearTimeout(wsReconnectTimer);
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      playlist = msg.payload.playlist || [];
      config = msg.payload.config || {};
      applyConfig();
      if (playlist.length) startPlayer();
    } else if (msg.type === 'playlist') {
      playlist = msg.payload || [];
      applyConfig();
      restartPlayer();
    } else if (msg.type === 'config') {
      config = { ...config, ...msg.payload };
      applyConfig();
    }
  };

  ws.onclose = () => {
    document.getElementById('conn').className = 'warn';
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ════════════════════════════════════
//  CONFIG
// ════════════════════════════════════
function applyConfig() {
  const c = config;
  document.getElementById('hud-logo').textContent = c.logo || 'SIGNAGE';
  document.documentElement.style.setProperty('--accent', c.accent || '#00e5ff');

  const hud = document.getElementById('hud');
  hud.classList.toggle('hidden', !c.showHud);
  document.getElementById('dots').style.display = c.showDots ? 'flex' : 'none';

  // Ticker
  const ticker = document.getElementById('ticker');
  if (c.tickerEnabled && c.tickerText) {
    ticker.style.display = 'flex';
    ticker.style.backgroundColor = `rgba(0,0,0,.76)`;
    document.getElementById('ticker-label').textContent = c.tickerLabel || 'AVISOS';
    document.getElementById('ticker-label').style.background = c.accent || '#00e5ff';
    const t = c.tickerText;
    document.getElementById('ticker-text').textContent = `${t}   ·   ${t}   ·   ${t}`;
  } else {
    ticker.style.display = 'none';
  }

  // Orientation
  applyOrientation();
}

// ════════════════════════════════════
//  PLAYER
// ════════════════════════════════════
function startPlayer() {
  document.getElementById('empty').style.display = 'none';
  buildSlides();
  showSlide(0);
}

function restartPlayer() {
  clearTimeout(slideTimer);
  document.querySelectorAll('.slide').forEach(s => s.remove());
  if (!playlist.length) {
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('dots').innerHTML = '';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  buildSlides();
  showSlide(0);
}

function buildSlides() {
  const stage = document.getElementById('stage');
  stage.querySelectorAll('.slide').forEach(s => s.remove());

  playlist.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (config.fitCover ? ' cover' : '');
    if (config.transition === 'cut') slide.classList.add('no-fade');

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.url;
      slide.appendChild(img);
    } else if (item.type === 'video') {
      const vid = document.createElement('video');
      vid.src = item.url;
      // Removido o muted para permitir áudio.
      // Nota: O navegador pode bloquear o autoplay com áudio sem interação prévia.
      // O player já solicita um clique inicial para fullscreen, o que libera o áudio.
      vid.muted = false; vid.playsInline = true; vid.preload = 'auto';
      slide.appendChild(vid);
    } else if (item.type === 'url') {
      const frame = document.createElement('iframe');
      frame.src = item.url;
      frame.sandbox = 'allow-scripts allow-same-origin allow-forms';
      frame.style.cssText = 'width:100%;height:100%;border:none;position:absolute;inset:0;';
      slide.appendChild(frame);
    }

    if (item.title || item.subtitle) {
      const ov = document.createElement('div');
      ov.className = 'overlay';
      if (item.title) { const t = document.createElement('div'); t.className = 'overlay-title'; t.textContent = item.title; ov.appendChild(t); }
      if (item.subtitle) { const s = document.createElement('div'); s.className = 'overlay-sub'; s.textContent = item.subtitle; ov.appendChild(s); }
      slide.appendChild(ov);
    }

    stage.appendChild(slide);
  });

  buildDots();
}

function showSlide(idx) {
  clearTimeout(slideTimer);
  const slides = document.querySelectorAll('.slide');
  if (!slides.length) return;

  slides.forEach(s => s.classList.remove('active'));
  const slide = slides[idx];
  if (!slide) return;
  slide.classList.add('active');
  currentIdx = idx;
  updateDots(idx);

  const item = playlist[idx];
  const dur = (item.duration || config.duration || 10) * 1000;

  // Progress bar
  const pb = document.getElementById('progress');
  pb.style.transition = 'none'; pb.style.width = '0%';
  requestAnimationFrame(() => {
    pb.style.transition = `width ${dur}ms linear`; pb.style.width = '100%';
  });

  const vid = slide.querySelector('video');
  if (vid) {
    vid.currentTime = 0;
    vid.play().catch(()=>{});
    vid.onended = advance;
  } else {
    slideTimer = setTimeout(advance, dur);
  }
}

function advance() {
  const next = currentIdx + 1;
  if (next >= playlist.length) {
    if (config.loop !== false) showSlide(0);
  } else {
    showSlide(next);
  }
}

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = playlist.map((_,i) => `<div class="dot"></div>`).join('');
}
function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

// ════════════════════════════════════
//  CLOCK
// ════════════════════════════════════
function updateClock() {
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('hud-clock').textContent = `${hh}:${mm}`;
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('hud-date').innerHTML = `${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);

// Keyboard: F = fullscreen
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
});

// Auto fullscreen on click
document.body.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
}, { once: true });

connectWS();
</script>
</body>
</html>
